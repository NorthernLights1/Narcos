# Build and publish the Narcos app image (D83).
#
# On a version tag (v*): run the full test suite, then build a linux/amd64
# image and push it to GHCR (private). The client machine pulls this image;
# nothing here touches the client. Tag a release with:
#   git tag v1.0.0 && git push origin v1.0.0
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: narcos
          POSTGRES_USER: narcos
          POSTGRES_PASSWORD: narcos-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U narcos"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      NARCOS_SECRET_KEY: ci-only-secret
      NARCOS_DB_PASSWORD: narcos-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
